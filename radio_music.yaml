esphome:
  name: radio-music
  friendly_name: Raspiaudio Radio Music
  min_version: 2026.1.0
  name_add_mac_suffix: false
  
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(startup_logo_until_ms) = millis() + 5000;
      - output.turn_off: dac_mute
      - light.turn_on:
          id: screen_backlight
          brightness: 100%
      - script.execute: led_red
      - script.execute: apply_codec_volume
      
  project:
    name: raspiaudio.radio-music-assistant
    version: "2026.1.3"  
    
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
    advanced:
      include_builtin_idf_components:
        - esp_http_client
logger:
  level: warn

api:
  on_client_connected:
    - lambda: |-
        if (!id(boot_sound_played)) {
          id(boot_sound_played) = true;
          if (id(startup_sound_switch).state) {
            id(play_sound)->execute(true, std::string("ready_sound"));
          }
        }
        
