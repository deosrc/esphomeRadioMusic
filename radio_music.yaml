es8388:
  
i2c:
  id: codec_bus
  sda: GPIO18
  scl: GPIO11
  scan: true
  frequency: 100kHz
i2c_device:
  id: my_es8388
  address: 0x10

spi:
  - id: spi_bus0
    clk_pin: GPIO12
    mosi_pin: GPIO8
    interface: hardware
   
display:
  - platform: ili9xxx
    id: my_display
    model: ST7789V
    cs_pin: GPIO40
    dc_pin: GPIO39
    reset_pin: GPIO9
    invert_colors: true
    rotation: 90
    update_interval: never
    auto_clear_enabled: false
    lambda: |-
      const uint32_t now = millis();
      if (now < id(startup_logo_until_ms)) {
        it.image(0, 0, id(startup_logo));
        return;
      }

      auto text_width = [&](display::BaseFont *font, const std::string &text) -> int {
        int x1, y1, width, height;
        it.get_text_bounds(0, 0, text.c_str(), font, TextAlign::TOP_LEFT, &x1, &y1, &width, &height);
        return width;
      };
      auto fit_chars_to_width = [&](display::BaseFont *font, const std::string &text, int max_width) -> int {
        if (text.empty()) return 0;
        int fitted = 0;
        for (size_t len = 1; len <= text.size(); len++) {
          if (text_width(font, text.substr(0, len)) > max_width) break;
          fitted = len;
        }
        if (fitted == 0) return 1;
        return fitted;
      };
      auto scroll_text = [&](display::BaseFont *font, const std::string &text, int max_width,
                             bool &is_scrolling) -> std::string {
        is_scrolling = false;
        if (text.empty()) return std::string("");
        const int visible_chars = fit_chars_to_width(font, text, max_width);
        if ((int) text.size() <= visible_chars) return text;
        is_scrolling = true;
        const int max_offset = text.size() - visible_chars;
        const int pause_steps = 3;
        const int step = (now / 750);
        const int cycle = max_offset + 1 + pause_steps;
        int offset = cycle > 0 ? (step % cycle) : 0;
        if (offset > max_offset) offset = max_offset;
        return text.substr(offset, visible_chars);
      };
      auto truncate_text = [&](display::BaseFont *font, const std::string &text, int max_width) -> std::string {
        if (text.empty()) return std::string("");
        if (text_width(font, text) <= max_width) return text;
        std::string ellipsis = "...";
        int fitted = fit_chars_to_width(font, text, max_width);
        while (fitted > 1 && text_width(font, text.substr(0, fitted) + ellipsis) > max_width) {
          fitted--;
        }
        if (fitted <= 1) return text.substr(0, 1);
        return text.substr(0, fitted) + ellipsis;
      };
      auto is_valid = [&](const std::string &text) -> bool {
        return !text.empty() && text != "unknown" && text != "unavailable" && text != "None";
      };
      auto format_duration = [&](int total_seconds) -> std::string {
        if (total_seconds <= 0) return std::string("");
        int hours = total_seconds / 3600;
        int minutes = (total_seconds % 3600) / 60;
        int seconds = total_seconds % 60;
        char buffer[16];
        if (hours > 0) {
          snprintf(buffer, sizeof(buffer), "%d:%02d:%02d", hours, minutes, seconds);
        } else {
          snprintf(buffer, sizeof(buffer), "%02d:%02d", minutes, seconds);
        }
        return std::string(buffer);
      };

      std::string content_id = id(ma_media_content_id).state;
      std::string title = id(ma_media_title).state;
      std::string artist = id(ma_media_artist).state;
      std::string album_name = id(ma_media_album_name).state;
      std::string duration_text = id(ma_duration_text).state;
      float duration_seconds = id(ma_media_duration).state;
      float volume_level = id(ma_volume_level).state;
      const uint32_t content_ts = id(meta_content_change_ms);
      const uint32_t title_stale_slack_ms = 500;
      const uint32_t radio_meta_stale_slack_ms = 1500;
      const uint32_t duration_stale_slack_ms = 1500;

      if (!is_valid(content_id)) content_id = "";
      if (!is_valid(title)) title = "";
      if (!is_valid(artist)) artist = "";
      if (!is_valid(album_name)) album_name = "";
      if (!is_valid(duration_text)) duration_text = "";
      if (volume_level != volume_level) volume_level = id(Vol);
      const bool is_radio = content_id.find("radio") != std::string::npos;
      if (content_ts > 0) {
        if (id(meta_title_update_ms) + title_stale_slack_ms < content_ts) title = "";
        if (is_radio) {
          if (id(meta_album_update_ms) + radio_meta_stale_slack_ms < content_ts) album_name = "";
          if (id(meta_artist_update_ms) + radio_meta_stale_slack_ms < content_ts) artist = "";
        }
        if (id(meta_duration_update_ms) + duration_stale_slack_ms < content_ts) {
          duration_text = "";
          duration_seconds = -1.0f;
        }
      }

      std::string duration_line = duration_text;
      if (duration_line.empty() && duration_seconds == duration_seconds && duration_seconds > 0.5f) {
        duration_line = format_duration(int(duration_seconds + 0.5f));
      }

      int vol_percent = int(volume_level * 100.0f + 0.5f);
      if (vol_percent < 0) vol_percent = 0;
      if (vol_percent > 100) vol_percent = 100;
      std::string volume_line = std::to_string(vol_percent) + "%";
      const int album_width = 280;
      const int frame_width = 252;
      std::string top_display;
      std::string middle_display;
      std::string bottom_source;
      bool bottom_scrolling = false;

      if (is_radio) {
        if (album_name.empty()) {
          middle_display = truncate_text(id(ui_font_title), title, frame_width);
        } else {
          middle_display = truncate_text(id(ui_font_title), album_name, frame_width);
          if (!artist.empty() && !title.empty()) {
            bottom_source = artist + "..." + title;
          } else if (!artist.empty()) {
            bottom_source = artist;
          } else {
            bottom_source = title;
          }
        }
      } else {
        top_display = truncate_text(id(ui_font_album), album_name, album_width);
        middle_display = truncate_text(id(ui_font_title), artist, frame_width);
        bottom_source = title;
      }

      std::string bottom_display = scroll_text(id(ui_font_meta), bottom_source, frame_width, bottom_scrolling);

      it.filled_rectangle(0, 0, 320, 240, id(ui_bg));
      it.filled_rectangle(0, 0, 320, 56, id(ui_header));
      it.filled_rectangle(0, 56, 320, 3, id(ui_accent));
      it.filled_rectangle(12, 74, 296, 98, id(ui_panel));
      it.rectangle(12, 74, 296, 98, id(ui_accent));
      it.filled_rectangle(12, 186, 296, 42, id(ui_footer));

      if (!top_display.empty()) {
        it.printf(160, 16, id(ui_font_album), id(ui_text), TextAlign::TOP_CENTER, "%s", top_display.c_str());
      }
      if (!middle_display.empty()) {
        it.printf(160, 92, id(ui_font_title), id(ui_text), TextAlign::TOP_CENTER, "%s", middle_display.c_str());
      }
      if (!bottom_display.empty()) {
        if (bottom_scrolling) {
          it.printf(34, 132, id(ui_font_meta), id(ui_text_muted), "%s", bottom_display.c_str());
        } else {
          it.printf(160, 132, id(ui_font_meta), id(ui_text_muted), TextAlign::TOP_CENTER, "%s",
                    bottom_display.c_str());
        }
      }
      if (!duration_line.empty()) {
        it.printf(298, 154, id(ui_font_small), id(ui_text_muted), TextAlign::TOP_RIGHT, "%s", duration_line.c_str());
      }
      auto draw_battery_icon = [&]() {
        const int x = 274;
        const int y = 198;
        const int icon_width = 30;
        const int icon_height = 10;
        const int cap_width = 4;
        const int cap_height = icon_height / 2;
        const int inner_width = icon_width - 4;
        const int inner_height = icon_height - 4;

        it.rectangle(x, y, icon_width, icon_height, id(ui_text));
        it.filled_rectangle(x + icon_width, y + (icon_height - cap_height) / 2, cap_width, cap_height, id(ui_text));
        it.filled_rectangle(x + 2, y + 2, inner_width, inner_height, id(ui_bar_bg));

        if (!id(battery_percent).has_state()) {
          return;
        }

        float percent = id(battery_percent).state;
        if (percent < 0.0f) percent = 0.0f;
        if (percent > 100.0f) percent = 100.0f;

        Color level_color = id(ui_bar_fill);
        if (percent < 20.0f) {
          level_color = id(ui_batt_low);
        } else if (percent < 50.0f) {
          level_color = id(ui_batt_warn);
        }

        int fill_width = static_cast<int>(inner_width * (percent / 100.0f) + 0.5f);
        if (fill_width < 0) fill_width = 0;
        if (fill_width > inner_width) fill_width = inner_width;
        if (fill_width > 0) {
          it.filled_rectangle(x + 2, y + 2, fill_width, inner_height, level_color);
        }

        it.printf(x + icon_width / 2, y + icon_height + 2, id(ui_font_tiny), id(ui_text_muted), TextAlign::TOP_CENTER,
                  "%.0f%%", percent);
      };

      draw_battery_icon();
      it.printf(24, 194, id(ui_font_meta), id(ui_text), "%s", volume_line.c_str());

      const int bar_x = 78;
      const int bar_y = 200;
      const int bar_w = 184;
      const int bar_h = 8;
      int fill_w = int((bar_w * vol_percent) / 100.0f);
      if (fill_w < 0) fill_w = 0;
      if (fill_w > bar_w) fill_w = bar_w;
      it.filled_rectangle(bar_x, bar_y, bar_w, bar_h, id(ui_bar_bg));
      if (fill_w > 0) {
        it.filled_rectangle(bar_x, bar_y, fill_w, bar_h, id(ui_bar_fill));
      }

