i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO16
    i2s_bclk_pin: GPIO5
    i2s_mclk_pin: GPIO0

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_audio_id: i2s_audio_bus
    i2s_dout_pin: GPIO17
    dac_type: external
    channel: stereo
    sample_rate: 48000
    bits_per_sample: 16bit
    buffer_duration: 500ms

  - platform: mixer
    id: mixing_speaker
    output_speaker: box_speaker
    num_channels: 2
    source_speakers:
      - id: announcement_mixer_input
      - id: media_mixer_input

  - platform: resampler
    id: media_resampling_input
    output_speaker: media_mixer_input
    sample_rate: 48000

  - platform: resampler
    id: announcement_resampling_input
    output_speaker: announcement_mixer_input    
    sample_rate: 48000

sendspin:
  id: sendspin_hub
  task_stack_in_psram: true
  kalman_process_error: 0.01

media_source:
  - platform: sendspin
    id: sendspin_source
    buffer_size: 2000000
  - platform: file
    id: file_source
    files:
      - id: ready_sound
        file: ${startup_sound_file}

media_player:
  - platform: sendspin
    id: sendspin_media_player
  - platform: speaker_source
    name: none
    id: external_media_player
    announcement_speaker: announcement_resampling_input
    media_speaker: media_resampling_input

    announcement_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: 48000
    media_pipeline:
      format: FLAC
      num_channels: 2      
      sample_rate: 48000

    volume_increment: 0.05
    volume_min: 0.0
    volume_max: 1.0
    sources:
      - sendspin_source
      - file_source
    on_state:
      then:
        - lambda: |-
            using media_player::MediaPlayerState;
            auto state = id(external_media_player).state;
            if (
              state == MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING ||
              state == MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING
            ) {
              id(led_green).execute();
            } else {
              id(led_red).execute();
            }
            
            
sensor:
  - platform: homeassistant
    id: ma_volume_level
    entity_id: ${music_assistant_player_entity}
    attribute: volume_level
    internal: true
    on_value:
      then:
        - lambda: |-
            if (x == x) {
              id(Vol) = x;
            }
        - script.execute: apply_codec_volume
        - component.update: my_display
  - platform: homeassistant
    id: ma_media_duration
    entity_id: ${music_assistant_player_entity}
    attribute: media_duration
    internal: true
    on_value:
      then:
        - lambda: |-
            id(meta_duration_update_ms) = millis();
        - component.update: my_display
  - platform: adc
    id: button_adc
    pin: GPIO1
    attenuation: auto
    update_interval: .1s
    on_value_range:
      - above: 3.0
        then:
          - binary_sensor.template.publish:
              id: btn_confirm
              state: OFF
          - binary_sensor.template.publish:
              id: btn_1
              state: OFF
          - binary_sensor.template.publish:
              id: btn_2
              state: OFF
          - binary_sensor.template.publish:
              id: btn_3
              state: OFF
      - above: 0.41
        below: 0.45
        then:
          - binary_sensor.template.publish:
              id: btn_3
              state: ON
      - above: 0.8
        below: 0.84
        then:
          - binary_sensor.template.publish:
              id: btn_confirm
              state: ON
      - above: 1.50
        below: 1.61
        then:
          - binary_sensor.template.publish:
              id: btn_1
              state: ON
      - above: 1.98
        below: 2.03
        then:
          - binary_sensor.template.publish:
              id: btn_2
              state: ON
  - platform: adc
    pin: GPIO13
    name: Battery voltage
    id: battery_voltage
    device_class: voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    state_class: measurement
    entity_category: diagnostic
    update_interval: 15s
    attenuation: auto
    filters:
      - multiply: 2
      - calibrate_linear:
          - 0.0 -> 0.0
          - 4.58 -> 4.20
      - exponential_moving_average:
          alpha: 0.2
          send_every: 2
      - delta: 0.002
    on_value:
      then:
        - sensor.template.publish:
            id: battery_percent
            state: !lambda "return x;"
  - platform: template
    name: Battery
    id: battery_percent
    device_class: battery
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: measurement
    entity_category: diagnostic
    update_interval: 15s
    filters:
      - calibrate_polynomial:
          degree: 3
          datapoints:
            - 4.20 -> 100.0
            - 4.13 -> 97.1
            - 4.10 -> 94.2
            - 4.07 -> 88.4
            - 4.05 -> 82.7
            - 4.04 -> 76.9
            - 4.04 -> 71.1
            - 4.01 -> 65.3
            - 3.99 -> 59.5
            - 3.95 -> 53.8
            - 3.93 -> 48.0
            - 3.91 -> 42.2
            - 3.88 -> 36.4
            - 3.86 -> 30.6
            - 3.84 -> 24.9
            - 3.82 -> 19.1
            - 3.76 -> 13.3
            - 3.73 -> 10.4
            - 3.70 -> 7.5
            - 3.64 -> 4.6
            - 3.50 -> 1.7
            - 3.00 -> 0.0
      - lambda: return clamp(x, 0.0f, 100.0f);
  - platform: rotary_encoder
    name: "Volume"
    id: volume_encoder
    pin_a:
      number: GPIO42
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO3
      mode:
        input: true
        pullup: true
    on_anticlockwise:
      then:
        - script.execute:
            id: adjust_volume
            delta: -0.05
    on_clockwise:
      then:
        - script.execute:
            id: adjust_volume
            delta: 0.05
script:
  - id: apply_codec_volume
    then:
      - lambda: |-
          int reg = 33;
          int v = int(id(Vol) * 10.0f + 0.5f);
          if (id(Vol) < 0.1f) {
            reg = 23 + v;
          }
          id(my_es8388).write_byte(46, reg);
          id(my_es8388).write_byte(47, reg);
          id(my_es8388).write_byte(48, reg);
          id(my_es8388).write_byte(49, reg);
  - id: adjust_volume
    mode: single
    parameters:
      delta: float
    then:
      - light.turn_on:
          id: screen_backlight
          brightness: 100%
      - lambda: |-
          float scale = 1.0f;
          if (id(Vol) < 0.03f) scale = 0.05f;
          else if (id(Vol) < 0.10f) scale = 0.40f;
          else if (id(Vol) < 0.30f) scale = 0.50f;
          else if (id(Vol) < 0.50f) scale = 0.60f;

          id(Vol) += delta * scale;
          if (id(Vol) < 0.0f) id(Vol) = 0.0f;
          if (id(Vol) > 1.0f) id(Vol) = 1.0f;
          id(mute) = false;
      - script.execute: apply_codec_volume
      - media_player.volume_set:
          id: external_media_player
          volume: !lambda "return id(Vol);"
      - delay: 100ms          
      - component.update: my_display
  - id: play_sound
    parameters:
      priority: bool
      sound_file: string
    then:
      - if:
          condition:
            lambda: return priority;
          then:
            - media_player.stop:
                id: external_media_player
                announcement: true
      - lambda: |-
          if ( (id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING ) || priority) {
            id(external_media_player)
              ->make_call()
              .set_media_url("file://" + sound_file)
              .set_announcement(true)
              .perform();
          }
  - id: led_red
    then:
      - light.turn_on:
          id: screen_backlight
          brightness: 40%

  - id: led_green
    then:
      - light.turn_on:
          id: screen_backlight
          brightness: 100%

switch:
  - platform: template
    id: startup_sound_switch
    name: Startup sound
    icon: "mdi:card-text-outline"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

globals:
  - id: startup_logo_until_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: boot_sound_played
    type: bool
    restore_value: no
    initial_value: "false"
  - id: Vol
    type: float
    initial_value: '0.6'    
    restore_value: true
  - id: phase
    type: int
    initial_value: '0'    
  - id: mute  
    type: bool
    initial_value: 'false'  
  - id: meta_content_change_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: meta_album_update_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: meta_artist_update_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: meta_title_update_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: meta_duration_update_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

interval:
  - interval: 750ms
    then:
      - component.update: my_display

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO48
      inverted: true
      mode:
        input: true
        pullup: true
    name: Button
    on_press:
      then:
        - light.turn_on:
            id: screen_backlight
            brightness: 100%
        - media_player.toggle: sendspin_media_player
  - platform: template
    name: "Radio 4"
    id: btn_confirm
    on_press:
      - logger.log: "Radio 4 button pressed"
  - platform: template
    name: "Radio 1"
    id: btn_1
    on_press:
      - logger.log: "Radio 1 button pressed"
  - platform: template
    name: "Radio 2"
    id: btn_2
    on_press:
      - logger.log: "Radio 2 button pressed"
  - platform: template
    name: "Radio 3"
    id: btn_3
    on_press:
      - logger.log: "Radio 3 button pressed"

output:
  - platform: gpio
    id: dac_mute
    pin:
      number: GPIO46
      inverted: true
      mode:
        output: true
      ignore_strapping_warning: true
  - platform: ledc
    id: screen_backlight_pin
    pin:
      number: GPIO41
      mode:
        output: true

light:
  - platform: monochromatic
    output: screen_backlight_pin
    id: screen_backlight
    name: Screen Backlight
    restore_mode: ALWAYS_ON
