name: Test

on:
  workflow_dispatch: # Manual executions
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: 5 4 10 * *

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        esphome_version:
          - 2026.2.0
          - 2026.3.0
          - latest
    steps:
      - name: Check out the repository to the runner
        uses: actions/checkout@v4

      - name: Run compile test
        run: docker run --rm -v "${PWD}":/config -t ghcr.io/esphome/esphome:${{ matrix.esphome_version }} compile ./radio_music.yaml
