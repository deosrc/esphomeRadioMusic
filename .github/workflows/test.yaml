name: Test

on:
  workflow_dispatch: # Manual executions
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Run every monday to check compatibility with latest
    - cron: 52 3 * * 1

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        esphome_version:
          # Test min_version and latest
          - 2026.2.0
          - latest
    steps:
      - name: Check out the repository to the runner
        uses: actions/checkout@v4

      - name: Run compile test
        run: docker run --rm -v "${PWD}":/config -t ghcr.io/esphome/esphome:${{ matrix.esphome_version }} compile ./radio_music.yaml
